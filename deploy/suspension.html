<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servicio temporalmente suspendido</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a3d6b, #0d5fa3); color: #fff;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; padding: 2.5rem; max-width: 480px; text-align: center;
      backdrop-filter: blur(8px); }
    .logo { font-size: 1.75rem; font-weight: 800; margin-bottom: 1.5rem; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.75rem; }
    p { font-size: 0.95rem; line-height: 1.6; opacity: 0.9; margin-bottom: 0.5rem; }
    .contact { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.15);
      font-size: 0.9rem; }
    .contact a { color: #7dd3fc; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">MediCore</div>
    <div class="icon">🔒</div>
    <h1>Servicio temporalmente suspendido</h1>
    <p>El acceso a este sistema se encuentra pausado en este momento.</p>
    <p>Por favor comuníquese con su proveedor para regularizar el servicio y restablecer el acceso.</p>
    <div class="contact">
      Soporte: <a href="mailto:soporte@agsolutions.com">soporte@agsolutions.com</a>
    </div>
  </div>
</body>
</html>
